version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: e2e_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-e2echat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-e2echat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-e2echat} -d ${POSTGRES_DB:-e2echat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e_network

  redis:
    image: redis:8-alpine
    container_name: e2e_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e_network

  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: e2e_surrealdb
    restart: unless-stopped
    command: start --user ${SURREAL_USER:-root} --pass ${SURREAL_PASS:-changeme_surreal_password} memory
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: e2e_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-e2echat}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-e2echat}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/0
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:-changeme_surreal_password}
      SURREAL_NS: ${SURREAL_NS:-e2echat}
      SURREAL_DB: ${SURREAL_DB:-messages}
      SECRET_KEY: ${SECRET_KEY:-change_this_to_a_long_random_secret_key_in_production}
      RP_ID: ${RP_ID:-localhost}
      RP_NAME: ${RP_NAME:-Encrypted P2P Chat}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      surrealdb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - e2e_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: e2e_frontend
    restart: unless-stopped
    volumes:
      - frontend_dist:/app/dist
    networks:
      - e2e_network

  nginx:
    image: nginx:alpine
    container_name: e2e_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - e2e_network

volumes:
  postgres_data:
  redis_data:
  frontend_dist:

networks:
  e2e_network:
    driver: bridge
